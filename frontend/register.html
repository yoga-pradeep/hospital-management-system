
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #198754;
            color: white;
            border-radius: 12px 12px 0 0 !important;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="card register-card">
        <div class="card-header">
            <h4 class="mb-0">Patient Registration</h4>
            <small>23F3000598</small>
        </div>
        <div class="card-body p-4">

            <div class="alert alert-danger d-none" id="errorMsg"></div>
            <div class="alert alert-success d-none" id="successMsg"></div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="username" placeholder="Choose username">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" placeholder="Your email">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password" placeholder="Choose password">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" class="form-control" id="age" placeholder="Your age">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" id="gender">
                        <option value="">Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Blood Group</label>
                    <select class="form-select" id="blood_group">
                        <option value="">Select</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" placeholder="Phone number">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea class="form-control" id="address" rows="2" placeholder="Your address"></textarea>
            </div>

            <button class="btn btn-success w-100" onclick="handleRegister()">
                Register
            </button>

            <hr>
            <p class="text-center mb-0">
                Already have an account?
                <a href="index.html">Login here</a>
            </p>
        </div>
    </div>

    <script>
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('d-none');
            document.getElementById('successMsg').classList.add('d-none');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.remove('d-none');
            document.getElementById('errorMsg').classList.add('d-none');
        }

        async function handleRegister() {
            const username    = document.getElementById('username').value.trim();
            const email       = document.getElementById('email').value.trim();
            const password    = document.getElementById('password').value.trim();
            const age         = document.getElementById('age').value;
            const gender      = document.getElementById('gender').value;
            const blood_group = document.getElementById('blood_group').value;
            const phone       = document.getElementById('phone').value.trim();
            const address     = document.getElementById('address').value.trim();

            if (!username || !email || !password) {
                showError('Username, email and password are required');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify({
                        username, email, password,
                        age: age ? parseInt(age) : null,
                        gender, blood_group, phone, address
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('Registration successful! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError(data.message || 'Registration failed');
                }
            } catch (err) {
                showError('Cannot connect to server. Make sure Flask is running.');
            }
        }
    </script>
</body>
</html>
